services:
  postgres:
    image: postgres:16-alpine
    container_name: meliora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: meliora
      POSTGRES_PASSWORD: meliora
      POSTGRES_DB: meliora
    ports:
      - "5432:5432"
    volumes:
      - meliora_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: meliora-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - meliora_redis_data:/data

volumes:
  meliora_pg_data:
  meliora_redis_data:
